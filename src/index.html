<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosterApp - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center">

    <div class="flex flex-col md:flex-row w-full max-w-5xl bg-white shadow-2xl rounded-none md:h-[600px] overflow-hidden">
        
        <div class="bg-[#0062cc] text-white md:w-1/2 flex flex-col justify-center items-center p-12 text-center">
            <img src="./logo.jpg" alt="Logo RosterApp" class="w-32 h-32 mb-4 object-contain bg-white rounded-xl p-2 hidden">
            <h1 class="text-4xl font-bold mb-2 tracking-wide">RosterApp</h1>
            
            <h2 class="text-3xl font-bold mt-10 mb-4">Bienvenido de nuevo</h2>
            <p class="text-lg font-regular opacity-90">Gestiona tus turnos fácilmente.</p>
        </div>

        <div class="md:w-1/2 flex flex-col justify-center p-12 lg:p-20">
            <h2 class="text-[#0062cc] text-3xl font-bold mb-10 text-center">Iniciar Sesión</h2>
            
            <form action="#" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Correo electrónico</label>
                    <input type="email" id="email" placeholder="Correo electrónico" 
                           class="w-full border border-gray-300 px-4 py-3 text-gray-700 focus:outline-none focus:border-[#0062cc] focus:ring-1 focus:ring-[#0062cc] transition-colors">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••••" 
                           class="w-full border border-gray-300 px-4 py-3 text-gray-700 focus:outline-none focus:border-[#0062cc] focus:ring-1 focus:ring-[#0062cc] transition-colors">
                </div>

                <button type="button" class="w-full bg-[#0062cc] hover:bg-[#004ba0] text-white font-bold py-3 px-4 mt-4 transition-colors">
                    INICIAR SESIÓN
                </button>
            </form>

            <div class="mt-8 text-center space-y-4">
                <a href="#" class="text-[#0062cc] font-semibold hover:underline block">¿Olvidaste tu contraseña?</a>
                <p class="text-gray-600">No tienes cuenta? <a href="#" class="text-[#0062cc] font-semibold hover:underline">Regístrate</a></p>
            </div>
        </div>

    </div>

</body>
</html>
