<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosterApp - Mis Turnos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-50 h-screen flex flex-col">

    <header class="bg-[#0062cc] text-white p-4 shadow-md flex justify-between items-center px-8">
        <div class="text-2xl font-bold tracking-tight">RosterApp</div>
        <div class="flex items-center space-x-4">
            <span class="font-semibold">Hola, Juan Pérez</span>
            <button class="bg-white text-[#0062cc] font-bold py-1 px-4 text-sm hover:bg-gray-100 transition-colors">SALIR</button>
        </div>
    </header>

    <main class="flex-1 p-8 max-w-5xl mx-auto w-full">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Mis Próximos Turnos</h1>
            <p class="text-gray-500 mt-1">Consulta tus horarios asignados para esta semana.</p>
        </div>

        <div class="space-y-4">
            
            <div class="bg-white p-6 shadow-md border-l-8 border-[#138496] flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold text-gray-800">Lunes, 1 de Septiembre</h3>
                    <p class="text-gray-600 mt-1">Turno de Mañana</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold text-[#0062cc]">08:00 - 15:00</p>
                    <p class="text-sm font-semibold text-gray-500">8 horas</p>
                </div>
            </div>

            <div class="bg-white p-6 shadow-md border-l-8 border-[#138496] flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-bold text-gray-800">Martes, 2 de Septiembre</h3>
                    <p class="text-gray-600 mt-1">Turno de Mañana</p>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-bold text-[#0062cc]">08:00 - 15:00</p>
                    <p class="text-sm font-semibold text-gray-500">8 horas</p>
                </div>
            </div>

            <div class="bg-gray-100 p-6 border-2 border-dashed border-gray-300 text-center text-gray-500 font-semibold">
                Miércoles, 3 de Septiembre - Día Libre
            </div>

        </div>
    </main>

</body>
</html>
