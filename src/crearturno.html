<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosterApp - Crear Turno</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-200 h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-lg shadow-2xl border-t-8 border-[#0062cc]">
        <div class="p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Asignar Nuevo Turno</h2>
            
            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Fecha</label>
                    <input type="date" value="2025-09-01" class="w-full border border-gray-300 px-4 py-2 text-gray-700 focus:outline-none focus:border-[#0062cc]">
                </div>

                <div class="flex space-x-4">
                    <div class="w-1/2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Hora Inicio</label>
                        <input type="time" value="08:00" class="w-full border border-gray-300 px-4 py-2 text-gray-700 focus:outline-none focus:border-[#0062cc]">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Hora Fin</label>
                        <input type="time" value="15:00" class="w-full border border-gray-300 px-4 py-2 text-gray-700 focus:outline-none focus:border-[#0062cc]">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Asignar a Empleado(s)</label>
                    <select class="w-full border border-gray-300 px-4 py-2 text-gray-700 focus:outline-none focus:border-[#0062cc] bg-white">
                        <option>Juan Pérez - Cajero</option>
                        <option>Marta López - Reposición</option>
                        <option>Antonio Gómez - Encargado</option>
                    </select>
                </div>

                <div class="pt-6 flex justify-end space-x-3">
                    <button type="button" class="px-6 py-2 border border-gray-300 text-gray-700 font-bold hover:bg-gray-100">CANCELAR</button>
                    <button type="button" class="px-6 py-2 bg-[#0062cc] text-white font-bold hover:bg-[#004ba0]">GUARDAR TURNO</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
